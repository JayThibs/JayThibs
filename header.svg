<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1610"/>
      <stop offset="50%" stop-color="#152820"/>
      <stop offset="100%" stop-color="#1e3a2e"/>
    </linearGradient>
    <radialGradient id="fern-aura" cx="14%" cy="65%" r="30%">
      <stop offset="0%" stop-color="#4a6b54" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#4a6b54" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="seed-aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c75d5d" stop-opacity="0.4"/>
      <stop offset="70%" stop-color="#c75d5d" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c75d5d" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.04"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="overlay"/>
    </filter>
    <clipPath id="rounded">
      <rect width="900" height="280" rx="12"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <!-- Background -->
    <rect width="900" height="280" fill="url(#bg)"/>
    <rect width="900" height="280" fill="url(#fern-aura)"/>

    <!-- Grain texture -->
    <rect width="900" height="280" filter="url(#grain)" opacity="0.6"/>

    <!-- Subtle mycelium network (appears late) -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="1.5s" begin="3.5s" fill="freeze"/>
      <line x1="260" y1="210" x2="380" y2="175" stroke="#4a6b54" stroke-width="0.4" opacity="0.12"/>
      <line x1="380" y1="175" x2="500" y2="195" stroke="#4a6b54" stroke-width="0.4" opacity="0.1"/>
      <line x1="500" y1="195" x2="620" y2="165" stroke="#4a6b54" stroke-width="0.4" opacity="0.08"/>
      <line x1="620" y1="165" x2="760" y2="185" stroke="#4a6b54" stroke-width="0.4" opacity="0.06"/>
      <line x1="380" y1="175" x2="420" y2="240" stroke="#4a6b54" stroke-width="0.3" opacity="0.08"/>
      <line x1="500" y1="195" x2="480" y2="250" stroke="#4a6b54" stroke-width="0.3" opacity="0.06"/>
      <line x1="620" y1="165" x2="660" y2="230" stroke="#4a6b54" stroke-width="0.3" opacity="0.06"/>
      <circle cx="380" cy="175" r="1.5" fill="#7a8c75" opacity="0.2"/>
      <circle cx="500" cy="195" r="1.2" fill="#7a8c75" opacity="0.15"/>
      <circle cx="620" cy="165" r="1.5" fill="#7a8c75" opacity="0.12"/>
      <circle cx="760" cy="185" r="1" fill="#7a8c75" opacity="0.08"/>
    </g>

    <!-- ═══════════════════════════════════════ -->
    <!-- BOTANICAL LINE DRAWING                  -->
    <!-- 4 elegant arcs growing from a seed point -->
    <!-- ═══════════════════════════════════════ -->

    <!-- Seed node at origin — the "Goodheart" -->
    <circle cx="130" cy="252" r="4" fill="#c75d5d" opacity="0">
      <animate attributeName="opacity" from="0" to="0.6" dur="0.5s" begin="0.2s" fill="freeze"/>
      <animate attributeName="r" values="4;5.5;4" dur="3s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.85;0.6" dur="3s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <!-- Seed aura -->
    <circle cx="130" cy="252" r="14" fill="url(#seed-aura)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="0.3s" fill="freeze"/>
      <animate attributeName="r" values="14;18;14" dur="3s" begin="1s" repeatCount="indefinite"/>
    </circle>

    <!-- Arc 1: Far left — sweeping outward -->
    <path d="M 130,252 C 110,210 85,170 65,120 Q 55,85 70,45"
          stroke="#5a7c65" stroke-width="1.8" stroke-linecap="round" fill="none"
          stroke-dasharray="350" stroke-dashoffset="350">
      <animate attributeName="stroke-dashoffset" from="350" to="0" dur="2s" begin="0.5s" fill="freeze"
               calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
    </path>
    <!-- Leaf accents on Arc 1 -->
    <path d="M 95,155 Q 75,145 68,160" stroke="#7a8c75" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0">
      <animate attributeName="opacity" from="0" to="0.6" dur="0.4s" begin="1.3s" fill="freeze"/>
    </path>
    <path d="M 78,115 Q 60,108 55,125" stroke="#7a8c75" stroke-width="1" stroke-linecap="round" fill="none" opacity="0">
      <animate attributeName="opacity" from="0" to="0.5" dur="0.4s" begin="1.6s" fill="freeze"/>
    </path>
    <path d="M 70,75 Q 55,68 52,82" stroke="#7a8c75" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0">
      <animate attributeName="opacity" from="0" to="0.4" dur="0.4s" begin="1.9s" fill="freeze"/>
    </path>

    <!-- Arc 2: Center-left — main stem, tallest -->
    <path d="M 130,252 C 128,205 135,160 130,115 Q 126,70 135,20"
          stroke="#4a6b54" stroke-width="2" stroke-linecap="round" fill="none"
          stroke-dasharray="320" stroke-dashoffset="320">
      <animate attributeName="stroke-dashoffset" from="320" to="0" dur="2.2s" begin="0.8s" fill="freeze"
               calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
    </path>
    <!-- Leaf accents on Arc 2 -->
    <path d="M 132,180 Q 112,170 105,185" stroke="#7a8c75" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0">
      <animate attributeName="opacity" from="0" to="0.55" dur="0.4s" begin="1.5s" fill="freeze"/>
    </path>
    <path d="M 130,140 Q 148,130 158,145" stroke="#7a8c75" stroke-width="1.1" stroke-linecap="round" fill="none" opacity="0">
      <animate attributeName="opacity" from="0" to="0.5" dur="0.4s" begin="1.8s" fill="freeze"/>
    </path>
    <path d="M 129,100 Q 112,92 108,108" stroke="#7a8c75" stroke-width="1" stroke-linecap="round" fill="none" opacity="0">
      <animate attributeName="opacity" from="0" to="0.45" dur="0.4s" begin="2.1s" fill="freeze"/>
    </path>
    <path d="M 131,65 Q 145,56 152,70" stroke="#7a8c75" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0">
      <animate attributeName="opacity" from="0" to="0.4" dur="0.4s" begin="2.4s" fill="freeze"/>
    </path>

    <!-- Arc 3: Center-right — graceful curve -->
    <path d="M 130,252 C 145,215 160,180 175,140 Q 190,100 200,55"
          stroke="#5a7c65" stroke-width="1.6" stroke-linecap="round" fill="none"
          stroke-dasharray="300" stroke-dashoffset="300">
      <animate attributeName="stroke-dashoffset" from="300" to="0" dur="2s" begin="1.1s" fill="freeze"
               calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
    </path>
    <!-- Leaf accents on Arc 3 -->
    <path d="M 160,175 Q 175,165 182,180" stroke="#7a8c75" stroke-width="1" stroke-linecap="round" fill="none" opacity="0">
      <animate attributeName="opacity" from="0" to="0.5" dur="0.4s" begin="1.8s" fill="freeze"/>
    </path>
    <path d="M 180,125 Q 165,118 160,132" stroke="#7a8c75" stroke-width="0.9" stroke-linecap="round" fill="none" opacity="0">
      <animate attributeName="opacity" from="0" to="0.4" dur="0.4s" begin="2.1s" fill="freeze"/>
    </path>
    <path d="M 192,85 Q 205,76 210,92" stroke="#7a8c75" stroke-width="0.7" stroke-linecap="round" fill="none" opacity="0">
      <animate attributeName="opacity" from="0" to="0.35" dur="0.4s" begin="2.4s" fill="freeze"/>
    </path>

    <!-- Arc 4: Far right — short, young growth -->
    <path d="M 130,252 C 155,230 180,210 210,185 Q 235,165 250,140"
          stroke="#7a8c75" stroke-width="1.3" stroke-linecap="round" fill="none"
          stroke-dasharray="220" stroke-dashoffset="220">
      <animate attributeName="stroke-dashoffset" from="220" to="0" dur="1.8s" begin="1.4s" fill="freeze"
               calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
    </path>
    <!-- Leaf accents on Arc 4 -->
    <path d="M 195,200 Q 210,192 215,208" stroke="#b8bfb0" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0">
      <animate attributeName="opacity" from="0" to="0.35" dur="0.4s" begin="2.2s" fill="freeze"/>
    </path>
    <path d="M 228,168 Q 215,162 212,175" stroke="#b8bfb0" stroke-width="0.7" stroke-linecap="round" fill="none" opacity="0">
      <animate attributeName="opacity" from="0" to="0.3" dur="0.4s" begin="2.5s" fill="freeze"/>
    </path>

    <!-- Small spore particles that drift upward after fern draws -->
    <circle cx="90" cy="90" r="1.2" fill="#b8bfb0" opacity="0">
      <animate attributeName="opacity" values="0;0.35;0" dur="5s" begin="3.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="90;60;90" dur="5s" begin="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="160" cy="55" r="0.8" fill="#7a8c75" opacity="0">
      <animate attributeName="opacity" values="0;0.3;0" dur="6s" begin="4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="55;30;55" dur="6s" begin="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="210" cy="120" r="1" fill="#b8bfb0" opacity="0">
      <animate attributeName="opacity" values="0;0.25;0" dur="7s" begin="4.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="120;90;120" dur="7s" begin="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="55" cy="60" r="0.7" fill="#5a7c65" opacity="0">
      <animate attributeName="opacity" values="0;0.3;0" dur="5.5s" begin="5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="60;35;60" dur="5.5s" begin="5s" repeatCount="indefinite"/>
    </circle>

    <!-- ═══════════════════════════════════════ -->
    <!-- TYPOGRAPHY                              -->
    <!-- ═══════════════════════════════════════ -->

    <!-- Name — appears after botanical drawing begins -->
    <text x="540" y="108" text-anchor="middle" fill="#FAF9F6"
          font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="400"
          letter-spacing="0.5" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="1s" begin="2.2s" fill="freeze"
               calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
      Jacques Thibodeau
    </text>

    <!-- Thin divider -->
    <line x1="470" y1="128" x2="610" y2="128" stroke="#4a6b54" stroke-width="0.8" opacity="0">
      <animate attributeName="opacity" from="0" to="0.5" dur="0.8s" begin="2.6s" fill="freeze"/>
    </line>

    <!-- Role — tracking creates distinction -->
    <text x="540" y="156" text-anchor="middle" fill="#b8bfb0"
          font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="13" font-weight="500"
          letter-spacing="4" opacity="0">
      <animate attributeName="opacity" from="0" to="0.85" dur="0.8s" begin="2.8s" fill="freeze"/>
      AI SAFETY RESEARCHER &amp; FOUNDER
    </text>

    <!-- Stealth note — subtle, italic, serif for contrast -->
    <text x="540" y="188" text-anchor="middle" fill="#7a8c75"
          font-family="Georgia, 'Times New Roman', serif" font-size="14" font-weight="400"
          font-style="italic" opacity="0">
      <animate attributeName="opacity" from="0" to="0.65" dur="0.8s" begin="3.2s" fill="freeze"/>
      building in stealth
    </text>
  </g>
</svg>
