<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1610"/>
      <stop offset="40%" style="stop-color:#152820"/>
      <stop offset="100%" style="stop-color:#1e3a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5a7c65;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#4a6b54;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="warmglow" cx="15%" cy="85%" r="30%">
      <stop offset="0%" style="stop-color:#c75d5d;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#c75d5d;stop-opacity:0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="grain"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.08"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="overlay"/>
    </filter>
  </defs>

  <style>
    @keyframes fadeSlideIn {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeSlideInSlow {
      0%, 30% { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes growLine {
      0% { stroke-dashoffset: 200; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes leafFade {
      0%, 40% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes branchDraw {
      0% { stroke-dashoffset: 600; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes dotPulse {
      0%, 50% { opacity: 0; r: 0; }
      70% { opacity: 0.7; }
      100% { opacity: 0.4; r: 3; }
    }
    .name {
      animation: fadeSlideIn 1.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      opacity: 0;
    }
    .subtitle {
      animation: fadeSlideInSlow 2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      opacity: 0;
    }
    .branch {
      stroke-dasharray: 600;
      stroke-dashoffset: 600;
      animation: branchDraw 3s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
    }
    .leaf {
      animation: leafFade 2s ease-out forwards;
      animation-delay: 1.2s;
      opacity: 0;
    }
    .leaf2 {
      animation: leafFade 2s ease-out forwards;
      animation-delay: 1.6s;
      opacity: 0;
    }
    .leaf3 {
      animation: leafFade 2s ease-out forwards;
      animation-delay: 2s;
      opacity: 0;
    }
    .dot1 {
      animation: dotPulse 2.5s ease-out forwards;
      animation-delay: 1.8s;
    }
    .dot2 {
      animation: dotPulse 2.5s ease-out forwards;
      animation-delay: 2.2s;
    }
    .dot3 {
      animation: dotPulse 2.5s ease-out forwards;
      animation-delay: 2.6s;
    }
    .line-accent {
      stroke-dasharray: 200;
      stroke-dashoffset: 200;
      animation: growLine 1.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      animation-delay: 0.5s;
    }
  </style>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#warmglow)"/>

  <!-- Grain texture overlay -->
  <rect width="1200" height="400" filter="url(#grain)" opacity="0.5"/>

  <!-- Botanical elements (left side) -->
  <!-- Main branch -->
  <path class="branch" d="M 60 400 Q 80 320 100 260 Q 120 200 110 140 Q 100 80 120 30"
        fill="none" stroke="#4a6b54" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Secondary branch -->
  <path class="branch" d="M 100 260 Q 140 230 180 220 Q 200 215 220 225"
        fill="none" stroke="#5a7c65" stroke-width="1.2" stroke-linecap="round"
        style="animation-delay: 0.4s"/>

  <!-- Tertiary branch -->
  <path class="branch" d="M 110 180 Q 80 160 55 130 Q 40 110 30 80"
        fill="none" stroke="#5a7c65" stroke-width="1" stroke-linecap="round"
        style="animation-delay: 0.8s"/>

  <!-- Leaves -->
  <ellipse class="leaf" cx="120" cy="30" rx="8" ry="18" fill="#4a6b54" opacity="0"
           transform="rotate(-15, 120, 30)"/>
  <ellipse class="leaf" cx="225" cy="222" rx="6" ry="14" fill="#5a7c65" opacity="0"
           transform="rotate(25, 225, 222)"/>
  <ellipse class="leaf2" cx="30" cy="75" rx="7" ry="16" fill="#4a6b54" opacity="0"
           transform="rotate(-40, 30, 75)"/>
  <ellipse class="leaf2" cx="145" cy="155" rx="5" ry="12" fill="#5a7c65" opacity="0"
           transform="rotate(35, 145, 155)"/>
  <ellipse class="leaf3" cx="85" cy="100" rx="6" ry="13" fill="#4a6b54" opacity="0"
           transform="rotate(-20, 85, 100)"/>

  <!-- Small decorative dots -->
  <circle class="dot1" cx="170" cy="250" r="0" fill="#7a8c75" opacity="0"/>
  <circle class="dot2" cx="195" cy="195" r="0" fill="#7a8c75" opacity="0"/>
  <circle class="dot3" cx="50" cy="190" r="0" fill="#7a8c75" opacity="0"/>
  <circle class="dot1" cx="240" cy="240" r="0" fill="#5a7c65" opacity="0" style="animation-delay: 2.4s"/>
  <circle class="dot2" cx="130" cy="310" r="0" fill="#5a7c65" opacity="0" style="animation-delay: 2.8s"/>

  <!-- Warm accent dot at base -->
  <circle class="dot3" cx="65" cy="370" r="0" fill="#c75d5d" opacity="0"
          style="animation-delay: 2s"/>

  <!-- Decorative line -->
  <line class="line-accent" x1="320" y1="230" x2="520" y2="230"
        stroke="#2d4a3e" stroke-width="1"/>

  <!-- Name text -->
  <text class="name" x="600" y="175"
        text-anchor="middle" dominant-baseline="central"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="52" font-weight="normal" letter-spacing="2"
        fill="#FAF9F6">
    Jacques Thibodeau
  </text>

  <!-- Subtitle -->
  <text class="subtitle" x="600" y="235"
        text-anchor="middle" dominant-baseline="central"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="18" letter-spacing="4" font-weight="300"
        fill="#b8bfb0" text-transform="uppercase">
    AI SAFETY RESEARCHER &amp; FOUNDER
  </text>
</svg>
